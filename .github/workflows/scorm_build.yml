name: Build SCORM Zip

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Download Bob
      run: |
        mkdir -p tools
        # Fetch the latest stable sha1
        BOB_SHA1=$(curl -s 'https://d.defold.com/stable/info.json' | grep -oP '"sha1":\s*"\K[^"]+')
        echo "Using Bob SHA1: $BOB_SHA1"
        curl -L -o tools/bob.jar "https://d.defold.com/archive/${BOB_SHA1}/bob/bob.jar"

    - name: Resolve Dependencies
      run: java -jar tools/bob.jar --email foo@bar.com --auth 12345 resolve

    - name: Build HTML5
      run: |
        mkdir -p build/html5
        java -jar tools/bob.jar --email foo@bar.com --auth 12345 --archive --platform js-web build bundle --variant release --archive --bundle-output build/html5

    - name: Package SCORM
      run: |
        # Find the actual output directory inside build
        EXPORT_DIR=$(find build/html5/js-web -maxdepth 1 -mindepth 1 -type d | head -n 1)
        if [ -z "$EXPORT_DIR" ]; then
          echo "Error: Could not find build directory"
          exit 1
        fi
        echo "Export directory: $EXPORT_DIR"
        cp imsmanifest.xml "$EXPORT_DIR/imsmanifest.xml"
        cd "$EXPORT_DIR"
        zip -r ../../../innvikta_driller_scorm.zip *

    - name: Upload SCORM Zip
      uses: actions/upload-artifact@v4
      with:
        name: scorm-package
        path: innvikta_driller_scorm.zip
