name: Build SCORM Zip

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Download Bob
      run: |
        mkdir -p tools
        curl -L -o tools/bob.jar https://d.defold.com/archive/stable/bob/bob.jar

    - name: Resolve Dependencies
      run: java -jar tools/bob.jar resolve

    - name: Build HTML5
      run: |
        mkdir -p build/html5
        java -jar tools/bob.jar --archive --platform js-web build bundle --variant release --archive build/html5

    - name: Package SCORM
      run: |
        # Find the actual output directory (it depends on project title)
        EXPORT_DIR=$(find build/html5/js-web -maxdepth 1 -mindepth 1 -type d | head -n 1)
        if [ -z "$EXPORT_DIR" ]; then
          echo "Error: Could not find build directory"
          exit 1
        fi
        echo "Export directory: $EXPORT_DIR"
        cp imsmanifest.xml "$EXPORT_DIR/imsmanifest.xml"
        cd "$EXPORT_DIR"
        zip -r ../../../../innvikta_driller_scorm.zip *

    - name: Upload SCORM Zip
      uses: actions/upload-artifact@v4
      with:
        name: scorm-package
        path: innvikta_driller_scorm.zip
